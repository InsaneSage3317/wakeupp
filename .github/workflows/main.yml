name: Build APK

on:
  push:
    branches: [ "main" ] # Runs every time you push to main
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Flutter needs Java to build Android apps

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Debug is easier as it doesn't need signing keys

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-flutter-app
          path: build/app/outputs/flutter-apk/app-debug.apk
